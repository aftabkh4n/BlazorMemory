<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlazorMemory Demo</title>
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css" />
</head>
<body>
    <div id="app">
        <div class="app-loading">
            <div class="loading-mark">◈</div>
            <div class="loading-text">Loading BlazorMemory...</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script>
        // Smooth scroll helper called from C# via JS Interop
        window.scrollToBottom = (element) => {
            if (element) {
                element.scrollTop = element.scrollHeight;
            }
        };
    </script>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/BlazorMemory.Components/blazorMemoryPanel.js"></script>
</body>
</html>
