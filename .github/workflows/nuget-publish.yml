name: Publish to NuGet

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on tags like v0.1.0, v1.0.0

jobs:
  publish:
    name: Pack & Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore BlazorMemory.sln

      - name: Build
        run: dotnet build BlazorMemory.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test BlazorMemory.sln --configuration Release --no-build

      - name: Pack all packages
        run: |
          dotnet pack src/BlazorMemory.Core/BlazorMemory.Core.csproj                               --configuration Release --no-build -o ./nupkgs
          dotnet pack src/BlazorMemory.Storage.InMemory/BlazorMemory.Storage.InMemory.csproj       --configuration Release --no-build -o ./nupkgs
          dotnet pack src/BlazorMemory.Storage.IndexedDb/BlazorMemory.Storage.IndexedDb.csproj     --configuration Release --no-build -o ./nupkgs
          dotnet pack src/BlazorMemory.Storage.EfCore/BlazorMemory.Storage.EfCore.csproj           --configuration Release --no-build -o ./nupkgs
          dotnet pack src/BlazorMemory.Embeddings.OpenAi/BlazorMemory.Embeddings.OpenAi.csproj     --configuration Release --no-build -o ./nupkgs
          dotnet pack src/BlazorMemory.Extractor.OpenAi/BlazorMemory.Extractor.OpenAi.csproj       --configuration Release --no-build -o ./nupkgs
          dotnet pack src/BlazorMemory.Extractor.Anthropic/BlazorMemory.Extractor.Anthropic.csproj --configuration Release --no-build -o ./nupkgs

      - name: Push to NuGet.org
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
