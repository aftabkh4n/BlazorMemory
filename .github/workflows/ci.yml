name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    name: Build & Test (.NET)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore BlazorMemory.sln

      - name: Build
        run: dotnet build BlazorMemory.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test BlazorMemory.sln --no-build --configuration Release --verbosity normal

  js-tests:
    name: Test (JavaScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vitest
        working-directory: src/BlazorMemory.Storage.IndexedDb/wwwroot/js
        run: npm init -y && npm install --save-dev vitest

      - name: Run JS tests
        working-directory: src/BlazorMemory.Storage.IndexedDb/wwwroot/js
        run: npx vitest run
